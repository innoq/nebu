syntax = "proto3";

package core;

option go_package = "github.com/nebu/nebu/internal/grpc/pb";

// CoreService: all gRPC operations between Go Gateway and Elixir Core.
// Go is always the client; Elixir is always the server.
service CoreService {
  // Matrix operations (unary request/response)
  rpc SendEvent(SendEventRequest)           returns (SendEventResponse);
  rpc CreateRoom(CreateRoomRequest)         returns (CreateRoomResponse);
  rpc JoinRoom(JoinRoomRequest)             returns (JoinRoomResponse);
  rpc LeaveRoom(LeaveRoomRequest)           returns (LeaveRoomResponse);
  rpc GetMessages(GetMessagesRequest)       returns (GetMessagesResponse);
  rpc SetPresence(SetPresenceRequest)       returns (SetPresenceResponse);
  rpc SetTyping(SetTypingRequest)           returns (SetTypingResponse);
  rpc ValidateToken(ValidateTokenRequest)   returns (ValidateTokenResponse);
  rpc GetPendingEvents(GetPendingEventsRequest)   returns (GetPendingEventsResponse);

  // Event Bus — server-streaming, one stream per Go instance
  rpc EventBus(EventBusRequest)             returns (stream Event);

  // GetMetrics — Admin Dashboard live metrics (Epic 3 skeleton; full implementation Epic 4)
  rpc GetMetrics(GetMetricsRequest)         returns (GetMetricsResponse);

  // GetRoomState — unary: Go queries current room members + metadata
  rpc GetRoomState(GetRoomStateRequest)     returns (GetRoomStateResponse);

  // InviteUser — invite a user to a room
  rpc InviteUser(InviteUserRequest)         returns (InviteUserResponse);

  // SetPowerLevels — update room power levels (caller must have change_state power)
  rpc SetPowerLevels(SetPowerLevelsRequest) returns (SetPowerLevelsResponse);

  // SendReceipt — persists a read receipt for a user in a room
  rpc SendReceipt(SendReceiptRequest) returns (SendReceiptResponse);

  // GetInitialSync — returns full state snapshot for all of a user's joined rooms
  rpc GetInitialSync(GetInitialSyncRequest) returns (GetInitialSyncResponse);

  // GetSyncDelta — incremental sync with long-polling; returns events after since_token
  rpc GetSyncDelta(GetSyncDeltaRequest) returns (GetSyncDeltaResponse);

  // GetPresence — returns presence status for a user (always succeeds; unknown users = offline)
  rpc GetPresence(GetPresenceRequest) returns (GetPresenceResponse);

  // UpdateProfile — upserts displayname and/or avatar_url for a user
  rpc UpdateProfile(UpdateProfileRequest) returns (UpdateProfileResponse);

  // WriteAuditLog — called by Go gateway for admin/compliance events that originate
  // in the Go layer (login, logout, bootstrap). Room events are logged directly by Elixir.
  rpc WriteAuditLog(WriteAuditLogRequest) returns (WriteAuditLogResponse);

  // DeleteUserKeys — DSGVO key deletion: atomically soft-deletes private keys for a user.
  // Story 5.7: instance_admin only. Returns keys_deleted_at (Unix ms) on success.
  // Elixir Core handles the Ecto.Multi + failure-invariant audit emission.
  rpc DeleteUserKeys(DeleteUserKeysRequest) returns (DeleteUserKeysResponse);

  // KickUser — room moderator action; power check enforced by GenServer
  rpc KickUser(KickUserRequest) returns (KickUserResponse);

  // BanUser — bans a user from a room; power check enforced by GenServer
  rpc BanUser(BanUserRequest) returns (BanUserResponse);

  // UnbanUser — removes a ban (sets membership: leave); power check enforced by GenServer
  rpc UnbanUser(UnbanUserRequest) returns (UnbanUserResponse);

  // ForgetRoom — marks a room as excluded from future /sync for the calling user
  rpc ForgetRoom(ForgetRoomRequest) returns (ForgetRoomResponse);

  // ListPublicRooms — returns paginated public rooms (join_rule=public) with live member counts.
  // Story 7-27: GET/POST /_matrix/client/v3/publicRooms.
  rpc ListPublicRooms(ListPublicRoomsRequest) returns (ListPublicRoomsResponse);

  // GetEventContext — returns the target event plus up to `limit` events before
  // and after it, a state snapshot, and pagination tokens compatible with GetMessages.
  // Story 7-28.
  rpc GetEventContext(GetEventContextRequest) returns (GetEventContextResponse);

  // InvalidateUserSessions — Story 6.5: revoke all sessions for a user (admin deactivation).
  // Calls SessionManager.destroy_session/1 for the target user.
  // Returns ok=true on success; gRPC error on DB failure.
  rpc InvalidateUserSessions(InvalidateUserSessionsRequest) returns (InvalidateUserSessionsResponse);
}

// Shared event type used across multiple RPCs
message Event {
  string event_id   = 1;
  string room_id    = 2;
  string sender_id  = 3;
  string event_type = 4;
  bytes  content    = 5;  // JSON-encoded event content
  int64  origin_ts  = 6;  // Unix milliseconds
  int64  server_ts  = 7;  // Unix milliseconds
}

// SendEvent
message SendEventRequest {
  string room_id    = 1;
  string sender_id  = 2;
  string event_type = 3;
  string txn_id     = 4;  // idempotency key
  bytes  content    = 5;
  int64  origin_ts  = 6;  // Unix milliseconds
}
message SendEventResponse {
  string event_id = 1;
}

// CreateRoom
message CreateRoomRequest {
  string          creator_id = 1;
  optional string name       = 2;
  optional string topic      = 3;
  bool            is_direct  = 4;
}
message CreateRoomResponse {
  string room_id = 1;
}

// JoinRoom
message JoinRoomRequest {
  string user_id          = 1;
  string room_id_or_alias = 2;
}
message JoinRoomResponse {
  string room_id = 1;
}

// LeaveRoom
message LeaveRoomRequest {
  string user_id = 1;
  string room_id = 2;
}
message LeaveRoomResponse {
  string room_id = 1;
}

// GetMessages
message GetMessagesRequest {
  string          room_id    = 1;
  string          from_token = 2;
  optional string to_token   = 3;
  int32           limit      = 4;
  string          direction  = 5;  // "b" (backward) or "f" (forward)
}
message GetMessagesResponse {
  repeated Event events     = 1;
  string         next_batch = 2;
  string         prev_batch = 3;
}

// SetPresence
message SetPresenceRequest {
  string          user_id    = 1;
  string          presence   = 2;  // "online", "offline", "unavailable"
  optional string status_msg = 3;
}
message SetPresenceResponse {}

// SetTyping
message SetTypingRequest {
  string room_id    = 1;
  string user_id    = 2;
  bool   typing     = 3;
  int32  timeout_ms = 4;
}
message SetTypingResponse {}

// ValidateToken — Go validates OIDC token, Elixir trusts Go fully (ADR G2)
// user_id and system_role arrive via gRPC metadata (x-user-id, x-system-role).
// display_name and email are for new-user provisioning only.
message ValidateTokenRequest {
  reserved 1;               // was: token (removed per ADR G2 — no token forwarding)
  string display_name = 2;  // OIDC preferred_username claim (Operational PII, Tier 1)
  string email        = 3;  // OIDC email claim (Sensitive PII, Tier 2)
}
message ValidateTokenResponse {
  reserved 1;               // was: valid (redundant — success = valid, errors use gRPC status codes)
  string user_id      = 2;  // @{sub}:{server_name}
  string system_role  = 3;  // "user" | "instance_admin" | "compliance_officer"
  string display_name = 4;  // Decrypted from Operational PII (Tier 1)
  bool   is_active    = 5;  // User account status
}

// GetPendingEvents — GELB-status fallback (unary polling instead of streaming)
message GetPendingEventsRequest {
  string node_id     = 1;
  string since_token = 2;
}
message GetPendingEventsResponse {
  repeated Event events     = 1;
  string         next_token = 2;
}

// EventBus — server-streaming, one stream per Go gateway instance
message EventBusRequest {
  string          node_id     = 1;
  optional string since_token = 2;
}

// GetMetrics — Admin Dashboard live metrics (Epic 3 skeleton; full implementation Epic 4)
message GetMetricsRequest {}

message GetMetricsResponse {
  float  msg_per_sec      = 1;  // messages per second (rolling 60s window)
  int32  active_sessions  = 2;  // currently active user sessions
  int32  room_count       = 3;  // total number of active rooms
}

// InviteUser
message InviteUserRequest {
  string room_id    = 1;
  string inviter_id = 2;  // caller (must be room member)
  string invitee_id = 3;  // user to invite
}
message InviteUserResponse {}

// GetRoomState — unary: Go queries current room members + metadata
message GetRoomStateRequest {
  string room_id    = 1;
  string event_type = 2;  // optional filter; empty = return all state events
  string state_key  = 3;  // optional; only meaningful when event_type is set
}
message GetRoomStateResponse {
  repeated string            members           = 1;  // kept for /members backward compat
  string                     power_levels_json = 2;  // kept for /members backward compat
  string                     room_name         = 3;  // kept for backward compat
  repeated SyncRoomStateEvent state_events     = 4;  // Story 7-19: full state array
}

// SetPowerLevels — update room power levels (caller must have change_state power)
message SetPowerLevelsRequest {
  string room_id           = 1;
  string power_levels_json = 2;  // JSON string of full power_levels map
}
message SetPowerLevelsResponse {}

// SendReceipt — persists a read receipt for a user in a room
message SendReceiptRequest {
  string room_id      = 1;
  string user_id      = 2;
  string receipt_type = 3;  // always "m.read" at MVP
  string event_id     = 4;
}
message SendReceiptResponse {}

// GetInitialSync — returns full state snapshot for all of a user's joined rooms
message GetInitialSyncRequest {
  string user_id = 1;
}

message GetInitialSyncResponse {
  string            since_token = 1;  // opaque token — becomes next_batch in HTTP response
  repeated SyncRoom rooms       = 2;
}

// SyncRoomStateEvent represents a state event in a SyncRoom (needs state_key)
message SyncRoomStateEvent {
  string type      = 1;  // e.g. "m.room.member", "m.room.power_levels"
  string state_key = 2;
  bytes  content   = 3;  // JSON-encoded content
  string sender    = 4;
}

// GetSyncDelta — incremental sync request with long-polling
message GetSyncDeltaRequest {
  string user_id     = 1;
  string since_token = 2;  // opaque token from previous next_batch
  int64  timeout_ms  = 3;  // long-poll wait time; 0 = return immediately; max 30000
}

message GetSyncDeltaResponse {
  string               since_token         = 1;  // new next_batch token for the client
  repeated SyncRoom    rooms               = 2;  // only rooms with new events
  bool                 fallback_to_initial = 3;  // true if since_token was unknown → full sync
}

// SyncRoom represents one joined room's state in an initial sync
message SyncRoom {
  string                      room_id         = 1;
  repeated SyncRoomStateEvent state_events    = 2;
  repeated Event              timeline_events = 3;
  bool                        limited         = 4;  // true if timeline was truncated at 20
  string                      prev_batch      = 5;  // pagination token for GET /messages
}

// GetPresence — reads from Presence.Manager ETS, never raises not_found (offline default)
message GetPresenceRequest {
  string user_id = 1;
}
message GetPresenceResponse {
  string presence        = 1;  // "online" | "offline" | "unavailable"
  int64  last_active_ago = 2;  // milliseconds since last active (0 if never seen)
}

// UpdateProfile — upserts displayname and/or avatar_url in the profiles table
// Fields are optional strings: empty string = do not update that field
message UpdateProfileRequest {
  string user_id     = 1;
  string displayname = 2;  // empty = not updating displayname
  string avatar_url  = 3;  // empty = not updating avatar_url
}
message UpdateProfileResponse {}

// WriteAuditLog — persists one audit record in a separate DB transaction.
// Go gateway sends admin-layer events (login, logout, bootstrap) via this RPC.
// Room events are written directly by Elixir (no gRPC roundtrip needed).
message WriteAuditLogRequest {
  string actor_user_id = 1;
  string action        = 2;
  string target_type   = 3;  // empty string for null
  string target_id     = 4;  // empty string for null
  bytes  metadata_json = 5;  // JSON-encoded map; empty bytes = {}
  string outcome       = 6;
  string error_detail  = 7;  // empty string = not applicable
}
message WriteAuditLogResponse {
  bool ok = 1;
}

// DeleteUserKeys — Story 5.7: atomically soft-deletes private signing + encryption keys for a user.
// Elixir Core runs a 5-step Ecto.Multi; on failure a separate Repo.transaction writes the
// "user_keys_deletion_attempted" audit record (failure invariant, AC3).
message DeleteUserKeysRequest {
  string admin_user_id  = 1;  // caller (instance_admin) subject
  string target_user_id = 2;  // user whose keys are to be deleted
  string reason         = 3;  // DSGVO deletion reason (min 10 chars, already validated by Go)
}
message DeleteUserKeysResponse {
  string status          = 1;  // "keys_deleted"
  int64  keys_deleted_at = 2;  // Unix milliseconds — convert to ISO8601 in Go handler
}

// KickUser — room moderator action; power check enforced by GenServer
message KickUserRequest {
  string room_id   = 1;
  string caller_id = 2;  // user performing the kick
  string target_id = 3;  // user to kick
  string reason    = 4;  // optional
}
message KickUserResponse {}

// BanUser — bans a user from a room; power check enforced by GenServer
message BanUserRequest {
  string room_id   = 1;
  string caller_id = 2;
  string target_id = 3;
  string reason    = 4;  // optional
}
message BanUserResponse {}

// UnbanUser — removes ban (sets membership: leave); power check enforced by GenServer
message UnbanUserRequest {
  string room_id   = 1;
  string caller_id = 2;
  string target_id = 3;
}
message UnbanUserResponse {}

// ForgetRoom — marks a room as excluded from future /sync for the calling user
message ForgetRoomRequest {
  string room_id = 1;
  string user_id = 2;
}
message ForgetRoomResponse {}

// ListPublicRooms — Story 7-27
// Cursor: since is the room_id of the last item on the previous page (lexicographic).
// filter_term: case-insensitive substring match on room name and topic (ILIKE '%term%').
message ListPublicRoomsRequest {
  int32  limit       = 1;  // max rooms per page; 0 = default 20; server caps at 100
  string since       = 2;  // opaque cursor from previous next_cursor; empty = first page
  string filter_term = 3;  // generic_search_term; empty = no filter
}

// RoomSummary represents one public room entry in the directory.
message RoomSummary {
  string room_id            = 1;
  string name               = 2;
  string topic              = 3;
  int32  num_joined_members = 4;  // live count from Room GenServer (or DB fallback)
  bool   world_readable     = 5;  // always false for Nebu rooms
  bool   guest_can_join     = 6;  // always false for Nebu rooms
}

message ListPublicRoomsResponse {
  repeated RoomSummary rooms          = 1;
  string               next_cursor    = 2;  // empty when no more pages
  int32                total_estimate = 3;  // approximate total public room count
}

// GetEventContext — Story 7-28
// Returns the target event, up to `limit` events before and after it, a state
// snapshot at the time of the event, and pagination tokens that are compatible
// with GetMessages (start is usable as `to`, end as `from`).
message GetEventContextRequest {
  string room_id  = 1;
  string event_id = 2;
  int32  limit    = 3;  // events before AND after; 0 = default 10; clamped to 100
}

// ContextStateEvent is a state event in the context snapshot (needs state_key).
message ContextStateEvent {
  string event_type = 1;
  string state_key  = 2;
  bytes  content    = 3;  // JSON-encoded
  string sender     = 4;
}

message GetEventContextResponse {
  Event                      event         = 1;  // the target event itself
  repeated Event             events_before = 2;  // up to `limit` events older than event (newest last)
  repeated Event             events_after  = 3;  // up to `limit` events newer than event (oldest first)
  repeated ContextStateEvent state         = 4;  // state snapshot at event time
  string                     start_token   = 5;  // pagination token — use as `to` in GET /messages
  string                     end_token     = 6;  // pagination token — use as `from` in GET /messages
}

// InvalidateUserSessions — Story 6.5: Admin deactivation revokes all active sessions.
// Calls SessionManager.destroy_session/1 for the target user.
// Returns ok=true on success; gRPC error on DB failure.
message InvalidateUserSessionsRequest {
  string user_id = 1;  // Matrix user ID (@localpart:server)
}

message InvalidateUserSessionsResponse {
  bool ok = 1;
}
