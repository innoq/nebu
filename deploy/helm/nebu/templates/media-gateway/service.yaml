apiVersion: v1
kind: Service
metadata:
  name: {{ include "nebu.fullname" . }}-media
  labels:
    {{- include "nebu.labels" . | nindent 4 }}
    app.kubernetes.io/component: media
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: 8009
      targetPort: media
      protocol: TCP
      name: media
  selector:
    {{- include "nebu.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: media
