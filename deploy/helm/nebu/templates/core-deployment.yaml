apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nebu.fullname" . }}-core
  labels:
    {{- include "nebu.labels" . | nindent 4 }}
    app.kubernetes.io/component: core
spec:
  replicas: {{ .Values.core.replicaCount }}
  selector:
    matchLabels:
      {{- include "nebu.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: core
  template:
    metadata:
      labels:
        {{- include "nebu.labels" . | nindent 8 }}
        app.kubernetes.io/component: core
    spec:
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: core
          image: "{{ .Values.image.registry }}/nebu-core:{{ required "core.image.tag must be set (use --set core.image.tag=X.Y.Z)" .Values.core.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 4000
              protocol: TCP
            - name: grpc
              containerPort: 9000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "nebu.fullname" . }}-config
          {{- if gt (int .Values.core.replicaCount) 1 }}
          # Story 13-6 AC4: clustering env vars injected when core.replicaCount > 1.
          # libcluster Kubernetes DNS strategy connects nodes via a headless Service.
          # RELEASE_NODE is set to the pod's Erlang node name (hostname-based).
          # CLUSTER_STRATEGY=kubernetes triggers the Kubernetes.DNS libcluster topology.
          env:
            # MY_POD_IP must be defined BEFORE RELEASE_NODE so that Kubernetes
            # resolves the $(MY_POD_IP) variable reference in definition order.
            - name: MY_POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: RELEASE_DISTRIBUTION
              value: "name"
            - name: RELEASE_NODE
              value: "nebu@$(MY_POD_IP)"
            - name: CLUSTER_STRATEGY
              value: "kubernetes"
            - name: KUBERNETES_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: KUBERNETES_SELECTOR
              value: "app.kubernetes.io/name={{ include "nebu.name" . }},app.kubernetes.io/component=core"
            - name: KUBERNETES_SERVICE_NAME
              value: "{{ include "nebu.fullname" . }}-core-headless"
          {{- end }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.core.resources | nindent 12 }}
          livenessProbe:
            tcpSocket:
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
