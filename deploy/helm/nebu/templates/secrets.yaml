{{/*
External Secret reference template — Story 13-4b (AC2).

SECURITY: This chart does NOT create a Kubernetes Secret with credential values.
Sensitive NEBU_* variables are loaded from a pre-existing Kubernetes Secret whose name
is configured via existingSecret.name. Operators must create that Secret out-of-band
before deploying — the chart never writes credential values to any manifest.

Pattern: ExistingSecret reference (operator-managed)
  kubectl create secret generic <existingSecret.name> \
    --from-literal=NEBU_DB_URL='...' \
    --from-literal=NEBU_INTERNAL_SECRET='...' \
    --from-literal=NEBU_OIDC_CLIENT_SECRET='...'

The Secret is mounted in gateway-deployment.yaml via envFrom.secretRef.
If existingSecret.name is empty, no secretRef is mounted and the gateway will
fail to connect to the database — see NOTES.txt for the full setup procedure.

values.yaml MUST NOT contain any sensitive credential values — only the secret name.
*/}}
