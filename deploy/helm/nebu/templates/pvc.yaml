{{- if not .Values.postgres.external -}}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "nebu.fullname" . }}-postgres
  labels:
    {{- include "nebu.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.postgres.storageClass }}
  storageClassName: {{ .Values.postgres.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.postgres.storage | quote }}
{{- end }}
