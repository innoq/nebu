apiVersion: v1
kind: Service
metadata:
  name: {{ include "nebu.fullname" . }}-gateway
  labels:
    {{- include "nebu.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: matrix
      protocol: TCP
      name: matrix
  selector:
    {{- include "nebu.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
