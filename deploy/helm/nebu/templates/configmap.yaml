apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nebu.fullname" . }}-config
  labels:
    {{- include "nebu.labels" . | nindent 4 }}
data:
  NEBU_OIDC_ISSUER: {{ .Values.config.oidcIssuer | quote }}
  NEBU_SERVER_NAME: {{ .Values.config.serverName | quote }}
  # Derived from the release name — deterministic from the chart, not a values entry.
  NEBU_CORE_GRPC_ADDR: "{{ include "nebu.fullname" . }}-core:9000"
