# Nebu Helm Chart — default values.
# Override these in your values.yaml or via --set flags.

image:
  registry: registry.gitlab.com/philippb/open-chat
  pullPolicy: IfNotPresent
  # Tag must be overridden via --set image.tag=<version> or a values file.
  # Leaving this empty prevents accidental deployment of an unversioned image.
  tag: ""

gateway:
  replicaCount: 2
  service:
    type: ClusterIP
    port: 8080
    matrixPort: 8008
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "1000m"
      memory: "512Mi"
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

mediaGateway:
  replicaCount: 1
  service:
    type: ClusterIP
    port: 8081
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "1000m"
      memory: "512Mi"

core:
  replicaCount: 2
  service:
    type: ClusterIP
    grpcPort: 9000
    httpPort: 4000
  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "2000m"
      memory: "1Gi"
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

ingress:
  enabled: true
  className: "nginx"
  annotations: {}
  host: chart-example.local
  tls:
    enabled: false
    secretName: nebu-tls

postgresql:
  # Set external: true and provide host/port/database when using an external DB.
  external: true
  host: ""
  port: 5432
  database: nebu
  # Name of a Kubernetes Secret with keys: username, password
  secretName: nebu-db-credentials

oidc:
  issuer: ""
  # Name of a Kubernetes Secret with keys: client_id, client_secret
  secretName: nebu-oidc-credentials

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podSecurityContext: {}
securityContext: {}
nodeSelector: {}
tolerations: []
affinity: {}
