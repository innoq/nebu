# Nebu Helm Chart — default values.
# Override these in your values.yaml or via --set flags.

image:
  registry: registry.gitlab.com/philippb/open-chat
  pullPolicy: IfNotPresent

gateway:
  # image.tag must be overridden via --set gateway.image.tag=<version> or a values file.
  # Leaving this empty prevents accidental deployment of an unversioned image.
  image:
    tag: ""
  replicaCount: 1
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "1000m"
      memory: "512Mi"
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

core:
  # image.tag must be overridden via --set core.image.tag=<version> or a values file.
  # Leaving this empty prevents accidental deployment of an unversioned image.
  image:
    tag: ""
  replicaCount: 1
  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "2000m"
      memory: "1Gi"
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

# Non-secret application configuration (rendered into ConfigMap)
config:
  oidcIssuer: ""
  serverName: ""
  # coreGrpcAddr is intentionally left empty: the ConfigMap derives the address from the
  # release name as "{{ fullname }}-core:9000" — a template expression that cannot be a
  # values default. Override only if you deploy core outside this chart.
  coreGrpcAddr: ""

# Gateway Service configuration
service:
  type: ClusterIP
  port: 8008

ingress:
  enabled: true
  className: "nginx"
  annotations: {}
  host: chart-example.local
  tls:
    enabled: false
    secretName: nebu-tls

postgres:
  # Set external: true to use an external database (default: true).
  # Set to false in local/dev environments to include a bundled PostgreSQL.
  external: true
  host: ""
  port: 5432
  database: nebu
  # Name of a Kubernetes Secret with keys: username, password
  secretName: nebu-db-credentials

oidc:
  # Name of a Kubernetes Secret with keys: client_id, client_secret
  secretName: nebu-oidc-credentials

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podSecurityContext: {}
securityContext: {}
nodeSelector: {}
tolerations: []
affinity: {}
