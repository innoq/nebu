name: Bug Report
description: Report a bug or unexpected behaviour in Nebu.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Before submitting, please search existing issues to avoid duplicates.
        For security vulnerabilities, do NOT use this form — see SECURITY.md.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the behaviour.
      placeholder: |
        1. Start the server with ...
        2. Send request to ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected_behaviour
    attributes:
      label: Expected Behaviour
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual_behaviour
    attributes:
      label: Actual Behaviour
      description: What actually happened?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Nebu Version
      description: "Branch (main) or commit SHA. Example: main / abc1234"
      placeholder: "main"
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Go version, Elixir/OTP version, OS.
      placeholder: |
        Go: 1.26
        Elixir: 1.19 / OTP 27
        OS: Ubuntu 24.04
    validations:
      required: true
