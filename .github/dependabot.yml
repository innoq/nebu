version: 2
updates:
  - package-ecosystem: "gomod"
    directories:
      - "/gateway"
      - "/media"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  - package-ecosystem: "mix"
    directory: "/core"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
