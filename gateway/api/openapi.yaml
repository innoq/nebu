openapi: "3.1.0"
info:
  title: "Nebu Admin API"
  version: "1.0.0"
servers:
  - url: "/api/v1"
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
    EmptyResponse:
      type: object
      description: Placeholder response; replaced in Epic 6 sub-stories
    UserListResponse:
      type: object
      required:
        - data
        - meta
      properties:
        data:
          type: array
          items:
            type: object
        meta:
          type: object
          required:
            - total
          properties:
            total:
              type: integer
            next_cursor:
              type: string
    UserDetailResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
security:
  - BearerAuth: []
paths:
  /health:
    get:
      operationId: GetHealth
      summary: Health check (unauthenticated)
      security: []
      responses:
        "200":
          description: Health status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /admin/users:
    get:
      operationId: ListAdminUsers
      summary: List users (instance_admin required)
      parameters:
        - name: cursor
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
        - name: search
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: User list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserListResponse"
        "400":
          description: Bad request (invalid cursor or limit)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
        "501":
          description: Not implemented
  /admin/users/{userId}:
    get:
      operationId: GetAdminUser
      summary: Get single user (instance_admin required)
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDetailResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
  /admin/rooms:
    get:
      operationId: ListAdminRooms
      summary: List rooms (placeholder — Story 6.7)
      responses:
        "200":
          description: Room list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
        "501":
          description: Not implemented
  /admin/config:
    get:
      operationId: GetAdminConfig
      summary: Get server config (placeholder — Story 6.10)
      responses:
        "200":
          description: Config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
        "501":
          description: Not implemented
  /admin/metrics:
    get:
      operationId: GetAdminMetrics
      summary: Get metrics (placeholder — Story 6.10)
      responses:
        "200":
          description: Metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
        "501":
          description: Not implemented
  /compliance/access-requests:
    get:
      operationId: ListComplianceAccessRequests
      summary: List compliance access requests (placeholder — Story 6.x)
      responses:
        "200":
          description: Access requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
        "501":
          description: Not implemented
