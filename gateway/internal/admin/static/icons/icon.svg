<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background square (needed for PNG export with solid bg) -->
  <rect width="512" height="512" fill="#0f1923"/>

  <!-- Outer hexagon -->
  <polygon points="256,42 442,149 442,363 256,470 70,363 70,149"
           fill="#0f1923" stroke="#f97316" stroke-width="18"/>

  <!-- Inner hexagon ring (subtle) -->
  <polygon points="256,88 406,175 406,337 256,424 106,337 106,175"
           fill="none" stroke="#f97316" stroke-width="6" opacity="0.25"/>

  <!-- N letterform -->
  <text x="256" y="330"
        font-family="Arial, Helvetica, sans-serif"
        font-size="280" font-weight="700"
        fill="#ffffff"
        text-anchor="middle"
        letter-spacing="-8">N</text>

  <!-- Accent dot top-right vertex -->
  <circle cx="442" cy="149" r="22" fill="#f97316"/>
</svg>
