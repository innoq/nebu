server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Docker's internal DNS resolver — required so nginx resolves upstream
    # hostnames per-request (not at startup), preventing crash when gateway
    # is not yet reachable during container init.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Proxy all Matrix Client-Server API requests to the gateway.
    # The browser talks to localhost:7070, so all /_matrix/ requests are same-origin
    # from the browser's perspective — no CORS headers needed.
    # Using a variable forces per-request DNS resolution via the resolver above.
    location /_matrix/ {
        set $upstream http://gateway:8008;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy /.well-known/matrix/ to the gateway.
    location /.well-known/matrix/ {
        set $upstream http://gateway:8008;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA fallback: serve index.html for any path not matching a static file.
    # Required for Flutter web router to handle deep links.
    location / {
        try_files $uri $uri/ /index.html;
        # Required for flutter_rust_bridge SharedArrayBuffer support (WASM threading).
        add_header Cross-Origin-Opener-Policy "same-origin";
        add_header Cross-Origin-Embedder-Policy "require-corp";
    }
}
