server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy all Matrix Client-Server API requests to the gateway.
    # The browser talks to localhost:7070, so all /_matrix/ requests are same-origin
    # from the browser's perspective — no CORS headers needed.
    location /_matrix/ {
        proxy_pass http://gateway:8008;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy /.well-known/matrix/ to the gateway.
    location /.well-known/matrix/ {
        proxy_pass http://gateway:8008;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA fallback: serve index.html for any path not matching a static file.
    # Required for Flutter web router to handle deep links.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
