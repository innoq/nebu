server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Docker's internal DNS resolver — required so nginx resolves upstream
    # hostnames per-request (not at startup), preventing crash when gateway
    # is not yet reachable during container init.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # COOP/COEP headers for SharedArrayBuffer support
    add_header Cross-Origin-Opener-Policy "same-origin";
    add_header Cross-Origin-Embedder-Policy "require-corp";

    # Proxy Matrix Client-Server API to gateway (same-origin — no CORS needed).
    # Using a variable forces per-request DNS resolution via the resolver above.
    location /_matrix/ {
        set $upstream http://gateway:8008;
        proxy_pass $upstream;
        proxy_set_header Host localhost:8008;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # well-known: return localhost:7070 as base_url so Element routes all API
    # calls through this nginx proxy (not directly to gateway:8008).
    location /.well-known/matrix/ {
        set $upstream http://gateway:8008;
        proxy_pass $upstream;
        proxy_set_header Host localhost:7070;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
