services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nebu
      POSTGRES_USER: nebu
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nebu_dev_password}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nebu -d nebu"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
