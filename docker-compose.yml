name: nebu

secrets:
  internal_secret:
    file: .secrets/internal_secret
  minio_root_user:
    file: .secrets/minio_root_user
  minio_root_password:
    file: .secrets/minio_root_password
  # Story 12.3 — IAM credentials for the nebu-app MinIO user (least-privilege: PutObject+GetObject only).
  # Generated by `make setup`. Used by the media gateway and the createbuckets init container.
  minio_app_access_key:
    file: .secrets/minio_app_access_key
  minio_app_secret_key:
    file: .secrets/minio_app_secret_key

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nebu
      POSTGRES_USER: nebu
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nebu_dev_password}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nebu -d nebu"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Story 5.29a — AC2: DB-init script provisions nebu_migrate and nebu_app roles
      # on first container start (docker-entrypoint-initdb.d runs only on empty volumes).
      - ./dev/postgres/init:/docker-entrypoint-initdb.d:ro

  gateway:
    build:
      context: ./gateway
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
        RELEASE_VERSION: ${RELEASE_VERSION:-unknown}
    depends_on:
      postgres:
        condition: service_healthy
      dex:
        condition: service_healthy
    secrets: [internal_secret]
    environment:
      # Story 5.29a — AC3: runtime uses nebu_app (non-superuser, bound by RLS)
      NEBU_DB_URL: "postgresql://nebu_app:nebu_app_dev_pw@postgres:5432/nebu"
      # Story 5.29a — AC3: migrations run as nebu_migrate (table owner)
      NEBU_DB_URL_MIGRATE: "postgresql://nebu_migrate:nebu_migrate_dev_pw@postgres:5432/nebu"
      NEBU_CORE_GRPC_ADDR: "core:9000"
      NEBU_INTERNAL_SECRET_FILE: "/run/secrets/internal_secret"
      NEBU_SERVER_NAME: "localhost"
      NEBU_OIDC_ISSUER: "http://dex:5556/dex"
      NEBU_OIDC_CLIENT_ID: "nebu-gateway"
      NEBU_OIDC_CLIENT_SECRET: "nebu-dev-secret"
      NEBU_OIDC_CLAIM_ROLE: "groups"
      # Fail-closed environment label. The gateway treats anything other than
      # {dev,development,test,staging} as production, so dev-only escape hatches
      # (NEBU_ALLOW_INSECURE_OIDC_ISSUER, NEBU_ALLOW_INSECURE_KEK) only apply
      # when this is set.
      NEBU_ENV: "dev"
      # DEV-ONLY: allow http:// OIDC issuer for the Docker-internal Dex hostname.
      # Requires NEBU_ENV=dev|development|test|staging — refused otherwise.
      NEBU_ALLOW_INSECURE_OIDC_ISSUER: "true"
    ports:
      - "8008:8008"
      - "8080:8080"
    healthcheck:
      test: ["CMD", "/healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  core:
    build:
      context: ./core
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
        RELEASE_VERSION: ${RELEASE_VERSION:-unknown}
    depends_on:
      postgres:
        condition: service_healthy
    secrets: [internal_secret]
    environment:
      # Story 5.29a — AC3: core also uses nebu_app at runtime (no DDL from core)
      NEBU_DB_URL: "postgresql://nebu_app:nebu_app_dev_pw@postgres:5432/nebu"
      DATABASE_URL: "ecto://nebu_app:nebu_app_dev_pw@postgres:5432/nebu"
      NEBU_INTERNAL_SECRET_FILE: "/run/secrets/internal_secret"
      NEBU_GATEWAY_INTERNAL_URL: "http://gateway:8008"
      NEBU_SERVER_NAME: "localhost"
      NEBU_PII_ENCRYPTION_KEY: "${NEBU_PII_ENCRYPTION_KEY:-6465766b65793030303030303030303030303030303030303030303030303030}"
    ports:
      # Story 5.29a — AC8: gRPC port 9000 is NOT published to the host.
      # Port 9000 is only reachable within the internal Compose network (core:9000).
      - "4000:4000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  dex:
    image: dexidp/dex:v2.45.1
    command: ["dex", "serve", "/etc/dex/config.yaml"]
    volumes:
      - ./dev/dex/config.yaml:/etc/dex/config.yaml:ro
      - dex_data:/var/dex
    ports:
      - "5556:5556"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:5556/dex/.well-known/openid-configuration || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  element:
    build:
      context: .
      dockerfile: docker/Dockerfile.element-e2e
    depends_on:
      gateway:
        condition: service_healthy
    ports:
      - "7070:80"
    profiles:
      - e2e

  # Story 12.1 — MinIO object storage (S3-compatible) for media uploads.
  # Credentials are read from Docker Secrets generated by `make setup` (.secrets/ is gitignored).
  # ADR-013: MinIO as S3-compatible object store for MVP.
  minio:
    image: minio/minio:RELEASE.2026-04-18T19-53-40Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      # Story 12.1 — AC2: credentials read from Docker Secrets, not hardcoded.
      # WARNING: These are example credentials for local development only.
      # Replace before first production start.
      MINIO_ROOT_USER_FILE: /run/secrets/minio_root_user
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_root_password
    ports:
      - "9000:9000"   # MinIO S3 API
      - "9001:9001"   # MinIO Console
    secrets:
      - minio_root_user
      - minio_root_password
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Story 12.1 — One-shot init container that creates the `nebu-media` bucket.
  # Story 12.3 — Extended: creates nebu-app IAM user with PutObject+GetObject policy only.
  # Runs after MinIO is healthy; exits 0 on success (idempotent — user/policy already exists is OK).
  createbuckets:
    # Story 12.7 — SEC Gate 2 fix [MEDIUM-4 + MEDIUM-6]:
    # - Bumped to 2026 release tag (security fix: Finding #6)
    # - Credentials passed via MC_HOST_minio env var and shell variables to keep secrets
    #   off argv (/proc/<pid>/cmdline) — defeats Docker Secrets goal if passed as mc args.
    # - mc admin user add uses --stdin form to avoid echoing credentials in argv.
    image: minio/mc:RELEASE.2026-04-18T09-06-52Z
    depends_on:
      minio:
        condition: service_healthy
    secrets:
      - minio_root_user
      - minio_root_password
      - minio_app_access_key
      - minio_app_secret_key
    volumes:
      - ./dev/minio/nebu-app-policy.json:/policy/nebu-app-policy.json:ro
    entrypoint: |
      /bin/sh -c '
      export MC_HOST_minio="http://$(cat /run/secrets/minio_root_user):$(cat /run/secrets/minio_root_password)@minio:9000"
      mc mb --ignore-existing minio/nebu-media
      APP_KEY=$$(cat /run/secrets/minio_app_access_key)
      APP_SECRET=$$(cat /run/secrets/minio_app_secret_key)
      printf "%s\n%s\n" "$$APP_KEY" "$$APP_SECRET" | mc admin user add minio --stdin || true
      mc admin policy create minio nebu-app-policy /policy/nebu-app-policy.json 2>/dev/null || mc admin policy add minio nebu-app-policy /policy/nebu-app-policy.json || true
      mc admin user policy attach minio nebu-app-policy --user "$$APP_KEY" 2>/dev/null || mc admin policy set minio nebu-app-policy user="$$APP_KEY" || true
      exit 0
      '

  # Story 12.3 — Media Gateway service wired to MinIO using nebu-app IAM credentials.
  # Credentials are read from Docker Secrets generated by `make setup`.
  # The nebu-app user has only s3:PutObject + s3:GetObject on nebu-media/* (see dev/minio/nebu-app-policy.json).
  media:
    build:
      context: ./media
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully
    secrets:
      - minio_app_access_key
      - minio_app_secret_key
    environment:
      NEBU_SERVER_NAME: "localhost"
      NEBU_DB_URL: "postgresql://nebu_app:nebu_app_dev_pw@postgres:5432/nebu"
      NEBU_STORAGE_BACKEND: "minio"
      NEBU_MINIO_ENDPOINT: "minio:9000"
      NEBU_MINIO_ACCESS_KEY_FILE: "/run/secrets/minio_app_access_key"
      NEBU_MINIO_SECRET_KEY_FILE: "/run/secrets/minio_app_secret_key"
      NEBU_MINIO_BUCKET: "nebu-media"
      NEBU_MINIO_USE_SSL: "false"
      # HIGH-2 [Story 12.7]: OIDC JWT validation for media upload.
      # Same OIDC provider as the API gateway — tokens issued by Dex are valid here too.
      NEBU_OIDC_ISSUER: "http://dex:5556/dex"
      NEBU_OIDC_CLIENT_ID: "nebu"
    ports:
      - "8009:8009"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8009/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
  dex_data:
  minio_data:
