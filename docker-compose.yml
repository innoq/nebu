name: nebu

secrets:
  internal_secret:
    file: .secrets/internal_secret
  minio_root_user:
    file: .secrets/minio_root_user
  minio_root_password:
    file: .secrets/minio_root_password

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nebu
      POSTGRES_USER: nebu
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nebu_dev_password}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nebu -d nebu"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Story 5.29a — AC2: DB-init script provisions nebu_migrate and nebu_app roles
      # on first container start (docker-entrypoint-initdb.d runs only on empty volumes).
      - ./dev/postgres/init:/docker-entrypoint-initdb.d:ro

  gateway:
    build:
      context: ./gateway
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
        RELEASE_VERSION: ${RELEASE_VERSION:-unknown}
    depends_on:
      postgres:
        condition: service_healthy
      dex:
        condition: service_healthy
    secrets: [internal_secret]
    environment:
      # Story 5.29a — AC3: runtime uses nebu_app (non-superuser, bound by RLS)
      NEBU_DB_URL: "postgresql://nebu_app:nebu_app_dev_pw@postgres:5432/nebu"
      # Story 5.29a — AC3: migrations run as nebu_migrate (table owner)
      NEBU_DB_URL_MIGRATE: "postgresql://nebu_migrate:nebu_migrate_dev_pw@postgres:5432/nebu"
      NEBU_CORE_GRPC_ADDR: "core:9000"
      NEBU_INTERNAL_SECRET_FILE: "/run/secrets/internal_secret"
      NEBU_SERVER_NAME: "localhost"
      NEBU_OIDC_ISSUER: "http://dex:5556/dex"
      NEBU_OIDC_CLIENT_ID: "nebu-gateway"
      NEBU_OIDC_CLIENT_SECRET: "nebu-dev-secret"
      NEBU_OIDC_CLAIM_ROLE: "groups"
      # Fail-closed environment label. The gateway treats anything other than
      # {dev,development,test,staging} as production, so dev-only escape hatches
      # (NEBU_ALLOW_INSECURE_OIDC_ISSUER, NEBU_ALLOW_INSECURE_KEK) only apply
      # when this is set.
      NEBU_ENV: "dev"
      # DEV-ONLY: allow http:// OIDC issuer for the Docker-internal Dex hostname.
      # Requires NEBU_ENV=dev|development|test|staging — refused otherwise.
      NEBU_ALLOW_INSECURE_OIDC_ISSUER: "true"
    ports:
      - "8008:8008"
      - "8080:8080"
    healthcheck:
      test: ["CMD", "/healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  core:
    build:
      context: ./core
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
        RELEASE_VERSION: ${RELEASE_VERSION:-unknown}
    depends_on:
      postgres:
        condition: service_healthy
    secrets: [internal_secret]
    environment:
      # Story 5.29a — AC3: core also uses nebu_app at runtime (no DDL from core)
      NEBU_DB_URL: "postgresql://nebu_app:nebu_app_dev_pw@postgres:5432/nebu"
      DATABASE_URL: "ecto://nebu_app:nebu_app_dev_pw@postgres:5432/nebu"
      NEBU_INTERNAL_SECRET_FILE: "/run/secrets/internal_secret"
      NEBU_GATEWAY_INTERNAL_URL: "http://gateway:8008"
      NEBU_SERVER_NAME: "localhost"
      NEBU_PII_ENCRYPTION_KEY: "${NEBU_PII_ENCRYPTION_KEY:-6465766b65793030303030303030303030303030303030303030303030303030}"
    ports:
      # Story 5.29a — AC8: gRPC port 9000 is NOT published to the host.
      # Port 9000 is only reachable within the internal Compose network (core:9000).
      - "4000:4000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  dex:
    image: dexidp/dex:v2.45.1
    command: ["dex", "serve", "/etc/dex/config.yaml"]
    volumes:
      - ./dev/dex/config.yaml:/etc/dex/config.yaml:ro
      - dex_data:/var/dex
    ports:
      - "5556:5556"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:5556/dex/.well-known/openid-configuration || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  element:
    build:
      context: .
      dockerfile: docker/Dockerfile.element-e2e
    depends_on:
      gateway:
        condition: service_healthy
    ports:
      - "7070:80"
    profiles:
      - e2e

  # Story 12.1 — MinIO object storage (S3-compatible) for media uploads.
  # Credentials are read from Docker Secrets generated by `make setup` (.secrets/ is gitignored).
  # ADR-013: MinIO as S3-compatible object store for MVP.
  minio:
    image: minio/minio:RELEASE.2024-01-18T22-51-28Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      # Story 12.1 — AC2: credentials read from Docker Secrets, not hardcoded.
      # WARNING: These are example credentials for local development only.
      # Replace before first production start.
      MINIO_ROOT_USER_FILE: /run/secrets/minio_root_user
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_root_password
    ports:
      - "9000:9000"   # MinIO S3 API
      - "9001:9001"   # MinIO Console
    secrets:
      - minio_root_user
      - minio_root_password
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Story 12.1 — One-shot init container that creates the `nebu-media` bucket.
  # Runs after MinIO is healthy; exits 0 on success (bucket already exists is idempotent).
  createbuckets:
    image: minio/mc:RELEASE.2024-01-18T07-18-52Z
    depends_on:
      minio:
        condition: service_healthy
    secrets:
      - minio_root_user
      - minio_root_password
    entrypoint: >
      /bin/sh -c "
      mc alias set minio http://minio:9000 $$(cat /run/secrets/minio_root_user) $$(cat /run/secrets/minio_root_password);
      mc mb --ignore-existing minio/nebu-media;
      exit 0;
      "

volumes:
  postgres_data:
  dex_data:
  minio_data:
