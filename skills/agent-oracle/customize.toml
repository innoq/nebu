# DO NOT EDIT -- overwritten on every update.
#
# Agent customization surface for agent-oracle.
# Team overrides:     {project-root}/_bmad/custom/agent-oracle.toml
# Personal overrides: {project-root}/_bmad/custom/agent-oracle.user.toml

[agent]

# --- Metadata (install-time roster contract) ---
# Consumed by module.yaml:agents[] and `[agents.<code>]` in central config.

code = "oracle"
name = "Oracle"
title = "Matrix Protocol Keeper"
icon = "🔮"
description = "Authoritative Matrix Client-Server API v1.18 spec expert, compliance reviewer, and implementation guide."
agent_type = "stateless"

# --- Configurable below. Overrides merge per BMad structural rules: ---
#   scalars: override wins • arrays (persistent_facts, activation_steps_*): append

# Steps to run before standard activation.
activation_steps_prepend = []

# Steps to run after greet but before user input.
activation_steps_append = []

# Persistent facts the Oracle keeps in mind for the whole session.
# Add project-specific Matrix implementation notes or spec deviation records here.
persistent_facts = [
  "file:{project-root}/**/project-context.md",
]

# --- Agent-specific configurables ---

# Spec version this instance is pinned to. Override in team/user toml to change.
matrix_spec_version = "v1.18"

# Path to a project-specific Matrix compliance notes file (optional).
# e.g. "file:{project-root}/docs/architecture/matrix-compliance-notes.md"
# compliance_notes = ""
