issuer: http://dex:5556/dex

storage:
  type: sqlite3
  config:
    file: /var/dex/dex.db

web:
  http: 0.0.0.0:5556

oauth2:
  responseTypes: [code]
  skipApprovalScreen: true
  grantTypes:
    - authorization_code

expiry:
  idTokens: 24h        # JWT ID token valid 24h (dev convenience — was 1h default)
  signingKeys: 6h

enablePasswordDB: true

staticClients:
  - id: nebu-gateway
    name: "Nebu Gateway"
    secret: nebu-dev-secret
    redirectURIs:
      - "http://localhost:8008/_matrix/client/v3/login/sso/redirect/oidc"
      - "http://localhost:7070/auth.html"

  - id: nebu-admin
    name: "Nebu Admin UI"
    secret: nebu-admin-secret
    redirectURIs:
      - "http://localhost:8008/admin/callback"

