# Nebu CI Pipeline
#
# Custom CI images are stored in the GitLab Container Registry and pre-install
# build dependencies (gcc for race detector, hex/rebar for Elixir).
#
# Build jobs rebuild images when their Dockerfiles change.
# Manual trigger available for initial setup (run build-ci-go + build-ci-elixir
# once before first pipeline run that uses them).
#
# Unit tests run directly inside custom images — no Docker-in-Docker needed.
# Integration test requires DinD to start the docker compose stack.

variables:
  DOCKER_DRIVER: overlay2
  CI_GO_IMAGE: $CI_REGISTRY_IMAGE/ci-go:1.26
  CI_ELIXIR_IMAGE: $CI_REGISTRY_IMAGE/ci-elixir:1.19
  GITLEAKS_VERSION: "8.24.3"

# Defaults applied to every job unless overridden.
# - `timeout: 30 minutes` bounds runaway jobs (Kassandra 8.6 review M-3).
# - `interruptible: true` cancels superseded pipelines on the same ref so a
#   public OSS repo cannot be DoS'd by rapid pushes.
default:
  timeout: 30 minutes
  interruptible: true

stages:
  - build-ci-images
  - lint
  - unit
  - scan
  - verify
  - integration

# ─── CI Image Builds ──────────────────────────────────────────────────────────

.build_ci_image: &build_ci_image
  stage: build-ci-images
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY

build-ci-go:
  <<: *build_ci_image
  script:
    - docker build -t $CI_REGISTRY_IMAGE/ci-go:1.26 -f docker/Dockerfile.ci.go .
    - docker push $CI_REGISTRY_IMAGE/ci-go:1.26
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes: [docker/Dockerfile.ci.go]
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes: [docker/Dockerfile.ci.go]
    - when: manual
      allow_failure: true

build-ci-elixir:
  <<: *build_ci_image
  script:
    - docker build -t $CI_REGISTRY_IMAGE/ci-elixir:1.19 -f docker/Dockerfile.ci.elixir .
    - docker push $CI_REGISTRY_IMAGE/ci-elixir:1.19
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes: [docker/Dockerfile.ci.elixir]
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes: [docker/Dockerfile.ci.elixir]
    - when: manual
      allow_failure: true

# ─── Shared helpers ───────────────────────────────────────────────────────────

# Downloads gitignored vendor JS files so that go:embed directives resolve.
# Must run before any `go vet` / `go test` step that compiles gateway/internal/admin.
.download_vendor: &download_vendor
  before_script:
    - mkdir -p gateway/internal/admin/static/vendor
    - wget -q -O gateway/internal/admin/static/vendor/vue.esm-browser.prod.js 'https://cdn.jsdelivr.net/npm/vue@3.5.13/dist/vue.esm-browser.prod.js'

# ─── Lint ─────────────────────────────────────────────────────────────────────

lint-go:
  <<: *download_vendor
  stage: lint
  image: $CI_REGISTRY_IMAGE/ci-go:1.26
  script:
    - cd gateway && go vet ./...
  cache:
    key: "go-${CI_COMMIT_REF_SLUG}"
    paths:
      - /root/go/pkg/mod
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH =~ /^feature\//'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# ─── Unit Tests ───────────────────────────────────────────────────────────────
# Run directly in custom images — no DinD, no make overhead.

test-unit-go:
  <<: *download_vendor
  stage: unit
  image: $CI_REGISTRY_IMAGE/ci-go:1.26
  script:
    - cd gateway && go test -race ./...
  cache:
    key: "go-${CI_COMMIT_REF_SLUG}"
    paths:
      - /root/go/pkg/mod
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH =~ /^feature\//'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

test-unit-elixir:
  stage: unit
  image: $CI_REGISTRY_IMAGE/ci-elixir:1.19
  script:
    - cd core && mix deps.get && mix test --warnings-as-errors
  cache:
    key: "mix-${CI_COMMIT_REF_SLUG}"
    paths:
      - core/deps
      - core/_build
      - ~/.hex
      - ~/.mix
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH =~ /^feature\//'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# ─── Secret Scan ──────────────────────────────────────────────────────────────

secret-scan:
  stage: scan
  image: $CI_REGISTRY_IMAGE/ci-go:1.26
  timeout: 30 minutes
  interruptible: true
  before_script:
    # Verify gitleaks tarball SHA256 against the upstream checksums file
    # before extracting (Kassandra 8.6 review H-1, CWE-494/829).
    - set -euo pipefail
    - BASE="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}"
    - TARBALL="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
    - curl -sSfL -o "${TARBALL}" "${BASE}/${TARBALL}"
    - curl -sSfL -o gitleaks_checksums.txt "${BASE}/gitleaks_${GITLEAKS_VERSION}_checksums.txt"
    - grep "  ${TARBALL}\$" gitleaks_checksums.txt | sha256sum -c -
    - tar -xzf "${TARBALL}" -C /usr/local/bin gitleaks
    - rm -f "${TARBALL}" gitleaks_checksums.txt
  script:
    - scripts/scan-secrets.sh --ci
  artifacts:
    when: always
    paths:
      - gitleaks-report.json
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH =~ /^feature\//'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# ─── Verify Docs ──────────────────────────────────────────────────────────────

verify-docs:
  stage: verify
  image: $CI_REGISTRY_IMAGE/ci-go:1.26
  script:
    - scripts/verify-readme-attribution.sh
    - scripts/verify-contributing.sh
    - scripts/verify-security-policy.sh
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH =~ /^feature\//'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# ─── Integration Test ─────────────────────────────────────────────────────────
# Requires DinD: starts docker compose stack, runs Gherkin tests, tears down.
# Test runner joins nebu_default network → reaches gateway:8080 and core:4000
# by service name (works in DinD where host.docker.internal is not available).

integration-test:
  stage: integration
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - apk add --no-cache make
  script:
    - make test-integration
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'