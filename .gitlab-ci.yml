# Nebu CI Pipeline
#
# Custom CI images are stored in the GitLab Container Registry and pre-install
# build dependencies (gcc for race detector, hex/rebar for Elixir).
#
# Build jobs rebuild images when their Dockerfiles change.
# Manual trigger available for initial setup (run build-ci-go + build-ci-elixir
# once before first pipeline run that uses them).
#
# CI image builds use Kaniko — no Docker daemon / DinD required, works on plain
# K8s runners. Only the integration-test job still needs DinD (docker compose
# spins up the full stack); it is routed to a DinD-capable runner via tags.

variables:
  DOCKER_DRIVER: overlay2
  CI_GO_IMAGE: $CI_REGISTRY_IMAGE/ci-go:1.26
  CI_ELIXIR_IMAGE: $CI_REGISTRY_IMAGE/ci-elixir:1.19
  GITLEAKS_VERSION: "8.24.3"

# Suppress duplicate pipelines: when a branch has an open MR, only the MR
# pipeline runs. Without this, every push fires both a branch and an MR pipeline.
# Tag pipelines (v*.*.* SemVer) are always allowed — they trigger the release stage.
workflow:
  rules:
    # RC/beta tags (v1.0.0-rc1) are intentionally excluded — only stable SemVer triggers release.
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS'
      when: never
    - if: '$CI_COMMIT_BRANCH'

# Defaults applied to every job unless overridden.
# - `timeout: 30 minutes` bounds runaway jobs (Kassandra 8.6 review M-3).
# - `interruptible: true` cancels superseded pipelines on the same ref so a
#   public OSS repo cannot be DoS'd by rapid pushes.
default:
  timeout: 30 minutes
  interruptible: true

stages:
  - build-ci-images
  - lint
  - unit
  - scan
  - verify
  - validate-iac
  - build
  - integration
  - release

# ─── CI Image Builds ──────────────────────────────────────────────────────────
# Kaniko builds container images without a Docker daemon.
# The -debug variant ships a busybox shell so before_script works.
# Credentials are written to /kaniko/.docker/config.json (Kaniko's default
# Docker credential location) — no `docker login` command needed.

.build_ci_image: &build_ci_image
  stage: build-ci-images
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  before_script:
    - mkdir -p /kaniko/.docker
    - |
      printf '{"auths":{"%s":{"auth":"%s"}}}' \
        "${CI_REGISTRY}" \
        "$(printf '%s:%s' "${CI_REGISTRY_USER}" "${CI_REGISTRY_PASSWORD}" | base64 | tr -d '\n')" \
        > /kaniko/.docker/config.json

build-ci-go:
  <<: *build_ci_image
  script:
    - /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile docker/Dockerfile.ci.go
      --destination "${CI_REGISTRY_IMAGE}/ci-go:1.26"
      --cache=true
      --cache-ttl=168h
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes: [docker/Dockerfile.ci.go]
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes: [docker/Dockerfile.ci.go]
    - when: manual
      allow_failure: true

build-ci-elixir:
  <<: *build_ci_image
  script:
    - /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile docker/Dockerfile.ci.elixir
      --destination "${CI_REGISTRY_IMAGE}/ci-elixir:1.19"
      --cache=true
      --cache-ttl=168h
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes: [docker/Dockerfile.ci.elixir]
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes: [docker/Dockerfile.ci.elixir]
    - when: manual
      allow_failure: true

build-ci-dex:
  <<: *build_ci_image
  script:
    - /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile docker/Dockerfile.dex-ci
      --destination "${CI_REGISTRY_IMAGE}/ci-dex:v2.45.1"
      --cache=true
      --cache-ttl=168h
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes: [docker/Dockerfile.dex-ci, dev/dex/config.yaml]
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes: [docker/Dockerfile.dex-ci, dev/dex/config.yaml]
    - when: manual
      allow_failure: true

# ─── Shared helpers ───────────────────────────────────────────────────────────

# Downloads gitignored vendor JS files so that go:embed directives resolve.
# Must run before any `go vet` / `go test` step that compiles gateway/internal/admin.
.download_vendor: &download_vendor
  before_script:
    - mkdir -p gateway/internal/admin/static/vendor
    - wget -q -O gateway/internal/admin/static/vendor/vue.esm-browser.prod.js 'https://cdn.jsdelivr.net/npm/vue@3.5.13/dist/vue.esm-browser.prod.js'

# ─── Lint ─────────────────────────────────────────────────────────────────────

lint-go:
  <<: *download_vendor
  stage: lint
  image: $CI_REGISTRY_IMAGE/ci-go:1.26
  script:
    - cd gateway && go vet ./...
  cache:
    key: "go-${CI_COMMIT_REF_SLUG}"
    paths:
      - /root/go/pkg/mod
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH =~ /^feature\//'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# ─── Unit Tests ───────────────────────────────────────────────────────────────
# Run directly in custom images — no DinD, no make overhead.

test-unit-go:
  <<: *download_vendor
  stage: unit
  image: $CI_REGISTRY_IMAGE/ci-go:1.26
  script:
    - cd gateway && go test -race ./...
  cache:
    key: "go-${CI_COMMIT_REF_SLUG}"
    paths:
      - /root/go/pkg/mod
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH =~ /^feature\//'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

test-unit-elixir:
  stage: unit
  image: $CI_REGISTRY_IMAGE/ci-elixir:1.19
  script:
    - cd core && mix deps.get && mix test --warnings-as-errors
  cache:
    key: "mix-${CI_COMMIT_REF_SLUG}"
    paths:
      - core/deps
      - core/_build
      - ~/.hex
      - ~/.mix
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH =~ /^feature\//'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# ─── Secret Scan ──────────────────────────────────────────────────────────────

secret-scan:
  stage: scan
  image: $CI_REGISTRY_IMAGE/ci-go:1.26
  timeout: 30 minutes
  interruptible: true
  before_script:
    # Verify gitleaks tarball SHA256 against the upstream checksums file
    # before extracting (Kassandra 8.6 review H-1, CWE-494/829).
    - set -euo pipefail
    - BASE="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}"
    - TARBALL="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
    - curl -sSfL -o "${TARBALL}" "${BASE}/${TARBALL}"
    - curl -sSfL -o gitleaks_checksums.txt "${BASE}/gitleaks_${GITLEAKS_VERSION}_checksums.txt"
    - grep "  ${TARBALL}\$" gitleaks_checksums.txt | sha256sum -c -
    - tar -xzf "${TARBALL}" -C /usr/local/bin gitleaks
    - rm -f "${TARBALL}" gitleaks_checksums.txt
  script:
    - scripts/scan-secrets.sh --ci
  artifacts:
    when: always
    paths:
      - gitleaks-report.json
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH =~ /^feature\//'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# ─── Verify Docs ──────────────────────────────────────────────────────────────

verify-docs:
  stage: verify
  image: $CI_REGISTRY_IMAGE/ci-go:1.26
  script:
    - scripts/verify-readme-attribution.sh
    - scripts/verify-contributing.sh
    - scripts/verify-security-policy.sh
    - scripts/verify-docs.sh
  allow_failure: false
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH =~ /^feature\//'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# ─── App Image Builds ─────────────────────────────────────────────────────────
# Kaniko builds the gateway and core application images and pushes them to the
# GitLab registry tagged with the commit SHA. No DinD required.
# These images are consumed by the integration-test job via docker-compose.ci.yml.

build-gateway-image:
  <<: *build_ci_image
  stage: build
  script:
    - /kaniko/executor
      --context "${CI_PROJECT_DIR}/gateway"
      --dockerfile gateway/Dockerfile
      --destination "${CI_REGISTRY_IMAGE}/gateway:${CI_COMMIT_SHA}"
      --cache=true
      --cache-ttl=24h
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

build-core-image:
  <<: *build_ci_image
  stage: build
  script:
    - /kaniko/executor
      --context "${CI_PROJECT_DIR}/core"
      --dockerfile core/Dockerfile
      --destination "${CI_REGISTRY_IMAGE}/core:${CI_COMMIT_SHA}"
      --cache=true
      --cache-ttl=24h
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# ─── Integration Test ─────────────────────────────────────────────────────────
# Requires DinD: starts docker compose stack, runs Gherkin tests, tears down.
# Test runner joins nebu_default network → reaches gateway:8080 and core:4000
# by service name (works in DinD where host.docker.internal is not available).
#
# This job is intentionally pinned to runners tagged `docker` — those are the
# only nodes where a privileged Docker daemon is available. Plain K8s runners
# (no DinD) cannot run docker compose.
#
# Job is manual (when: manual) so pipelines on plain K8s runners are not
# blocked. Trigger manually when a docker-tagged runner is available, or run
# locally via `make test-integration`.

integration-test:
  stage: integration
  tags:
    - docker
  image: docker:latest
  services:
    - name: docker:dind
      command: ["--tls=false"]
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - apk add --no-cache make openssl
    - until docker info; do sleep 1; done
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - make test-integration-ci
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
      allow_failure: true
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: manual
      allow_failure: true

# Daemonless alternative to integration-test for plain K8s runners (no DinD).
# Uses podman-compose instead of docker compose — no Docker daemon required.
# Requires the runner pod to have user namespaces enabled (/dev/fuse + SYS_ADMIN)
# or to run with privileged: true. If neither is available, the job will fail
# at `podman-compose up` with a "newuidmap" or "fuse" error.
integration-test-podman:
  stage: integration
  image: quay.io/podman/stable
  variables:
    COMPOSE_PROJECT_NAME: nebu
  before_script:
    - dnf install -y --quiet make openssl python3-pip
    - pip3 install --quiet podman-compose
    - podman login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - make setup
  script:
    - podman-compose -f docker-compose.yml -f docker-compose.ci.yml up -d --wait
    - podman run --rm -v "$CI_PROJECT_DIR:/workspace" -w /workspace
        --network=nebu_default
        -e NEBU_TEST_GATEWAY_URL=http://gateway:8080
        -e NEBU_TEST_CORE_URL=http://core:4000
        -e NEBU_TEST_DEX_URL=http://dex:5556
        -e NEBU_TEST_MATRIX_URL=http://gateway:8008
        -e NEBU_TEST_DB_URL=postgresql://nebu_app:nebu_app_dev_pw@postgres:5432/nebu
        -e NEBU_TEST_MIGRATION_DB_URL=postgresql://nebu_migrate:nebu_migrate_dev_pw@postgres:5432/nebu
        -e NEBU_TEST_CORE_GRPC_ADDR=core:9000
        -e NEBU_TEST_INTERNAL_SECRET="$(cat .secrets/internal_secret)"
        golang:1.26-alpine
        sh -c "apk add -q --no-cache gcc musl-dev && cd gateway && go test -v -tags integration ./test/integration/..."
  after_script:
    - podman-compose -f docker-compose.yml -f docker-compose.ci.yml down
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
      allow_failure: true
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: manual
      allow_failure: true
# ─── Integration Test — K8s-native (GitLab CI services:) ──────────────────────
# Runs on plain K8s runners without DinD/Podman. Uses GitLab CI `services:` to
# start sidecar containers in the same pod — no Docker daemon, no privilege
# escalation needed.
#
# All services start in parallel (no depends_on ordering). The gateway uses
# WaitAndRunMigrations (Story 8-11) with a 30s retry loop to survive slow DB
# boot. The test runner waits for the full stack via wait-for-stack.sh.
#
# Note: postgres init scripts (dev/postgres/init/) do NOT run in CI because
# there are no persistent volumes. We use the `nebu` superuser for all DB
# connections — the role split (nebu_migrate / nebu_app) is a production
# hardening, not required for CI testing.
#
# Credentials policy (ADR-012): all values below are example-only CI credentials.
# This upstream repo is never used for real deployments. Anyone deploying Nebu
# must fork and supply their own secrets. See ADR-012 and docs/architecture/adr/ADR-012.

integration-test-k8s:
  stage: integration
  image: $CI_REGISTRY_IMAGE/ci-go:1.26
  services:
     - name: postgres:16-alpine
       alias: postgres
       variables:
         POSTGRES_DB: nebu
         POSTGRES_USER: nebu
         POSTGRES_HOST_AUTH_METHOD: trust
     - name: $CI_REGISTRY_IMAGE/ci-dex:v2.45.1
       alias: dex
     - name: $CI_REGISTRY_IMAGE/core:${CI_COMMIT_SHA}
       alias: core
     - name: $CI_REGISTRY_IMAGE/gateway:${CI_COMMIT_SHA}
       alias: gateway
  variables:
    NEBU_DB_URL: "postgresql://nebu@postgres:5432/nebu"
    NEBU_DB_URL_MIGRATE: "postgresql://nebu@postgres:5432/nebu"
    NEBU_CORE_GRPC_ADDR: "core:9000"
    NEBU_INTERNAL_SECRET_FILE: ""
    NEBU_INTERNAL_SECRET: "ci-example-secret"
    NEBU_SERVER_NAME: "localhost"
    NEBU_OIDC_ISSUER: "http://dex:5556/dex"
    NEBU_OIDC_CLIENT_ID: "nebu-gateway"
    NEBU_OIDC_CLIENT_SECRET: "nebu-dev-secret"
    NEBU_OIDC_CLAIM_ROLE: "groups"
    NEBU_ENV: "dev"
    NEBU_ALLOW_INSECURE_OIDC_ISSUER: "true"
  before_script:
     - apk add --no-cache postgresql-client openssl
     - scripts/wait-for-stack.sh
  script:
     - |
       cd gateway
       NEBU_TEST_GATEWAY_URL=http://gateway:8008 \
       NEBU_TEST_CORE_URL=http://core:4000 \
       NEBU_TEST_DEX_URL=http://dex:5556 \
       NEBU_TEST_MATRIX_URL=http://gateway:8008 \
       NEBU_TEST_DB_URL=postgresql://nebu@postgres:5432/nebu \
       NEBU_TEST_MIGRATION_DB_URL=postgresql://nebu@postgres:5432/nebu \
       NEBU_TEST_CORE_GRPC_ADDR=core:9000 \
       NEBU_TEST_INTERNAL_SECRET=ci-example-secret \
       go test -v -tags integration ./test/integration/...
  rules:
     - if: '$CI_COMMIT_BRANCH == "main"'
       when: manual
       allow_failure: true
     - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
       when: manual
       allow_failure: true

# ─── IaC Validation ───────────────────────────────────────────────────────────
# Story 13-1 AC6: Validates OpenTofu formatting and syntax on every push that
# touches deploy/. No cloud credentials required — tofu validate checks HCL
# syntax and type correctness only, without connecting to any provider.

validate-iac:
  stage: validate-iac
  image: ghcr.io/opentofu/opentofu:1.9
  cache:
    key: "tofu-${CI_COMMIT_REF_SLUG}"
    paths:
      - deploy/tofu/examples/aws/.terraform/
      - deploy/tofu/examples/stackit/.terraform/
      - deploy/tofu/examples/k8s/.terraform/
  script:
    - echo "==> OpenTofu version"
    - tofu version
    - echo "==> Checking HCL formatting (tofu fmt -check -recursive)"
    - tofu fmt -check -recursive deploy/tofu/
    - echo "==> Validating deploy/tofu/examples/aws"
    - (cd deploy/tofu/examples/aws && tofu init -backend=false && tofu validate)
    - echo "==> Validating deploy/tofu/examples/stackit"
    - (cd deploy/tofu/examples/stackit && tofu init -backend=false && tofu validate)
    - echo "==> Validating deploy/tofu/examples/k8s"
    - (cd deploy/tofu/examples/k8s && tofu init -backend=false && tofu validate)
    - echo "==> IaC validation passed."
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - deploy/**/*
    - if: '$CI_COMMIT_BRANCH =~ /^feature\//'
      changes:
        - deploy/**/*
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - deploy/**/*

# Story 13-4a: Helm chart lint and template render check.
# Uses alpine/helm which ships only helm — separate job from validate-iac (different image).
# AC1: helm lint 0 warnings; AC2: helm template renders valid YAML.
validate-helm:
  stage: validate-iac
  image: alpine/helm:3.17
  script:
    - echo "==> Helm version"
    - helm version
    - echo "==> Linting deploy/helm/nebu/"
    - helm lint deploy/helm/nebu/ --set gateway.image.tag=validate --set core.image.tag=validate --set media.image.tag=validate
    - echo "==> Template render check deploy/helm/nebu/"
    - helm template nebu deploy/helm/nebu/ --set gateway.image.tag=validate --set core.image.tag=validate --set media.image.tag=validate > /dev/null
    - echo "==> Helm validation passed."
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - deploy/**/*
    - if: '$CI_COMMIT_BRANCH =~ /^feature\//'
      changes:
        - deploy/**/*
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - deploy/**/*

# ─── Release Image Builds ─────────────────────────────────────────────────────
# Triggered exclusively by SemVer Git tags (e.g. git tag v1.0.0 && git push origin v1.0.0).
# Produces versioned images: <CI_REGISTRY_IMAGE>/nebu-gateway:<semver> and nebu-core:<semver>.
# These images are referenced by operators via nebu_version in OpenTofu variables or
# gateway.image.tag / core.image.tag in Helm values.
#
# Image naming: nebu-gateway / nebu-core (not gateway / core as in SHA-tagged build images).
# The SHA-tagged images (build-gateway-image / build-core-image) are kept unchanged —
# they feed integration-test-k8s and must not be modified.
#
# --cache=false: avoid reusing branch-build Kaniko cache layers in release builds (deterministic, reproducible production images).

release-gateway-image:
  <<: *build_ci_image
  stage: release
  interruptible: false
  needs: []  # run independent of branch-only build/integration jobs
  script:
    - RELEASE_VERSION="${CI_COMMIT_TAG#v}" && /kaniko/executor
      --context "${CI_PROJECT_DIR}/gateway"
      --dockerfile gateway/Dockerfile
      --destination "${CI_REGISTRY_IMAGE}/nebu-gateway:${RELEASE_VERSION}"
      --build-arg "GIT_COMMIT=${CI_COMMIT_SHA}"
      --build-arg "BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
      --build-arg "RELEASE_VERSION=${RELEASE_VERSION}"
      --cache=false
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'

release-core-image:
  <<: *build_ci_image
  stage: release
  interruptible: false
  needs: []  # run independent of branch-only build/integration jobs
  script:
    - RELEASE_VERSION="${CI_COMMIT_TAG#v}" && /kaniko/executor
      --context "${CI_PROJECT_DIR}/core"
      --dockerfile core/Dockerfile
      --destination "${CI_REGISTRY_IMAGE}/nebu-core:${RELEASE_VERSION}"
      --build-arg "GIT_COMMIT=${CI_COMMIT_SHA}"
      --build-arg "BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
      --build-arg "RELEASE_VERSION=${RELEASE_VERSION}"
      --cache=false
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
release-media-image:
  <<: *build_ci_image
  stage: release
  interruptible: false
  needs: []     # run independent of branch-only build/integration jobs
  script:
    - RELEASE_VERSION="${CI_COMMIT_TAG#v}" && /kaniko/executor
      --context "${CI_PROJECT_DIR}/media"
      --dockerfile media/Dockerfile
      --destination "${CI_REGISTRY_IMAGE}/nebu-media:${RELEASE_VERSION}"
      --build-arg "GIT_COMMIT=${CI_COMMIT_SHA}"
      --build-arg "BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
      --build-arg "RELEASE_VERSION=${RELEASE_VERSION}"
      --cache=false
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
